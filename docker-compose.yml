version: '3.8'

services:
  mongodb:
    image: mongo:6
    container_name: complaint-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
      MONGO_INITDB_DATABASE: complaintDB
    networks:
      - complaint-net

  backend:
    build: ./backend
    container_name: complaint-backend
    restart: unless-stopped
    ports:
      - "5001:5000"
    depends_on:
      - mongodb
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://admin:password123@mongodb:27017/complaintDB?authSource=admin
      - JWT_SECRET=your_super_secret_key_change_me_in_production
    networks:
      - complaint-net

  frontend:
    image: nginx:alpine
    container_name: complaint-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - complaint-net

volumes:
  mongo_data:

networks:
  complaint-net:
    driver: bridge