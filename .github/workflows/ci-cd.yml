name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  DOCKER_HUB_USERNAME: priyankamanickam
  BACKEND_IMAGE: priyankamanickam/complaint-backend
  FRONTEND_IMAGE: priyankamanickam/complaint-frontend

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install test dependencies
        run: npm install axios
        working-directory: ./tests

      - name: Start test environment (MongoDB + Backend)
        run: |
          docker compose up -d mongodb backend
          sleep 15

      - name: Run integration tests
        run: node api-test.js
        working-directory: ./tests

      - name: Stop test environment
        run: docker compose down

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME || env.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ env.BACKEND_IMAGE }}:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ env.FRONTEND_IMAGE }}:latest

  deploy:
    needs: test-and-build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && success()
    steps:
      - name: Deploy to Azure VM
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.AZURE_VM_IP }}
          username: ${{ secrets.AZURE_VM_USER }}
          key: ${{ secrets.AZURE_SSH_KEY }}
          command_timeout: 30m
          script: |
            # Pull latest images (use quiet to reduce output)
            docker pull --quiet priyankamanickam/complaint-backend:latest
            docker pull --quiet priyankamanickam/complaint-frontend:latest
            docker pull mongo:6

            # Stop and remove old containers (ignore errors if they don't exist)
            docker stop complaint-backend complaint-frontend complaint-mongo 2>/dev/null || true
            docker rm complaint-backend complaint-frontend complaint-mongo 2>/dev/null || true

            # Start MongoDB
            docker run -d --name complaint-mongo --restart unless-stopped \
              -p 27017:27017 \
              -e MONGO_INITDB_ROOT_USERNAME=admin \
              -e MONGO_INITDB_ROOT_PASSWORD=password123 \
              -e MONGO_INITDB_DATABASE=complaintDB \
              -v mongo_data:/data/db \
              mongo:6

            # Start backend
            docker run -d --name complaint-backend --restart unless-stopped \
              -p 5001:5000 \
              --link complaint-mongo:mongodb \
              -e PORT=5000 \
              -e MONGO_URI="mongodb://admin:password123@mongodb:27017/complaintDB?authSource=admin" \
              -e JWT_SECRET=your_super_secret_key_change_me_in_production \
              priyankamanickam/complaint-backend:latest

            # Start frontend
            docker run -d --name complaint-frontend --restart unless-stopped \
              -p 80:80 \
              priyankamanickam/complaint-frontend:latest

            # Wait a few seconds for frontend to be ready
            sleep 5

            # Fix API_URL using the VM's public IP (from GitHub secret)
            VM_IP="${{ secrets.AZURE_VM_IP }}"
            docker exec complaint-frontend /bin/sh -c "sed -i 's|http://localhost:5001/api|http://'$VM_IP':5001/api|g' /usr/share/nginx/html/*.html"